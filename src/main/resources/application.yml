spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/onamfinder.db?busy_timeout=5000
    hikari.maximum-pool-size: 1
  security.user:
    name: admin
    password: admin

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.format_sql: true
    open-in-view: false

  servlet.multipart:
    max-request-size: 10MB
    max-file-size: 10MB

server:
  tomcat:
    max-part-count: 50
    max-part-header-size: 1024